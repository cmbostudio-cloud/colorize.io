<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>colorize.io</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="colorize.io" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#F7F5F0" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red:   #FF5C5C; --blue: #5C9EFF; --green: #5CDB95;
      --bg: #F7F5F0; --card: #FFFFFF; --text: #2D2D2D; --muted: #9B9B9B;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    html, body, #root {
      width: 100%; height: 100%; background: var(--bg);
      font-family: 'Nunito', sans-serif; color: var(--text);
      -webkit-tap-highlight-color: transparent; touch-action: none;
    }

    /* ══ LOBBY ══ */
    .lobby {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 100%; height: 100%; background: var(--bg); position: relative; overflow: hidden;
    }
    .lobby-inner { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 420px; gap: 16px; }
    .lobby-logo { font-size: clamp(2rem,8vw,3.4rem); font-weight: 900; letter-spacing: -1px; display: flex; align-items: center; gap: 8px; }
    .logo-circle { width: clamp(36px,9vw,56px); height: clamp(36px,9vw,56px); border-radius: 50%; background: var(--blue); flex-shrink: 0; box-shadow: 0 4px 16px rgba(92,158,255,0.35); position: relative; overflow: hidden; }
    .logo-circle::after { content:''; position:absolute; top:15%; left:18%; width:32%; height:32%; border-radius:50%; background:rgba(255,255,255,0.5); }
    .logo-text { display: flex; align-items: center; gap: 2px; }
    .lobby-card { background: var(--card); border-radius: 24px; padding: clamp(22px,4vh,36px) clamp(20px,5vw,40px); box-shadow: var(--shadow); width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: clamp(12px,2vh,16px); }
    .lobby-label { font-size: clamp(0.7rem,2vw,0.8rem); font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .lobby-input { width: 100%; border: 2px solid #ECECEC; border-radius: 12px; padding: clamp(10px,2vh,12px) 16px; font-size: clamp(0.9rem,2.5vw,1rem); font-family: 'Nunito',sans-serif; font-weight: 700; color: var(--text); outline: none; transition: border 0.2s; background: #FAFAFA; }
    .lobby-input:focus { border-color: var(--blue); background: #fff; }
    .team-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .team-btn { border: 2.5px solid transparent; border-radius: 14px; padding: clamp(9px,2vh,12px) 6px; font-family: 'Nunito',sans-serif; font-size: clamp(0.75rem,2.2vw,0.85rem); font-weight: 800; cursor: pointer; transition: all 0.18s; display: flex; flex-direction: column; align-items: center; gap: 5px; background: #F5F5F5; color: var(--muted); }
    .team-btn .team-dot { width: 20px; height: 20px; border-radius: 50%; }
    .team-btn.active-red   { border-color:var(--red);  background:#FFF0F0; color:var(--red); }
    .team-btn.active-blue  { border-color:var(--blue); background:#EFF5FF; color:var(--blue); }
    .team-btn.active-green { border-color:var(--green);background:#EDFFF5; color:var(--green); }
    .lobby-btn { width:100%; padding:clamp(11px,2.5vh,14px); border:none; border-radius:14px; font-family:'Nunito',sans-serif; font-size:clamp(0.9rem,2.5vw,1rem); font-weight:900; cursor:pointer; transition:transform 0.15s,opacity 0.15s; color:#fff; }
    .lobby-btn:hover  { transform:translateY(-2px); opacity:0.92; }
    .lobby-btn:active { transform:translateY(0); }
    .lobby-btn.red   { background:var(--red); }
    .lobby-btn.blue  { background:var(--blue); }
    .lobby-btn.green { background:var(--green); }
    .lobby-settings-btn { position:absolute; top:16px; right:16px; z-index:10; background:var(--card); border:none; border-radius:50%; width:44px; height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:var(--shadow); font-size:1.2rem; transition:transform 0.25s; }
    .lobby-settings-btn:hover { transform:rotate(40deg); }
    .lobby-col-logo,.lobby-col-nick,.lobby-col-team { display:none; }

    @media (max-width:768px) and (pointer:coarse) {
      .lobby { justify-content:stretch; padding:0; overflow:hidden; touch-action:none; }
      .lobby-inner > .lobby-logo, .lobby-inner > .lobby-card { display:none !important; }
      .lobby-inner { display:grid; grid-template-columns:1fr 1.5fr 1fr; grid-template-rows:1fr; width:100%; height:100%; max-width:none; gap:0; align-items:stretch; }
      .lobby-col-logo { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:20px 12px; background:var(--card); border-right:1.5px solid #E8E4DC; }
      .mob-logo-circle { width:min(64px,17vw); height:min(64px,17vw); border-radius:50%; background:var(--blue); flex-shrink:0; box-shadow:0 6px 24px rgba(92,158,255,0.4); position:relative; overflow:hidden; }
      .mob-logo-circle::after { content:''; position:absolute; top:14%; left:17%; width:30%; height:30%; border-radius:50%; background:rgba(255,255,255,0.55); }
      .mob-logo-word { display:flex; align-items:center; gap:1px; font-size:clamp(0.85rem,3vw,1.15rem); font-weight:900; letter-spacing:-0.5px; }
      .mob-logo-io { font-size:clamp(0.65rem,2vw,0.85rem); font-weight:700; color:#999; margin-top:2px; }
      .lobby-col-nick { display:flex; flex-direction:column; align-items:stretch; justify-content:center; padding:24px 18px; gap:14px; background:var(--bg); }
      .lobby-col-nick .lobby-label { font-size:0.68rem; }
      .lobby-col-nick .lobby-input { font-size:0.9rem; padding:13px 14px; border-radius:14px; }
      .lobby-col-nick .lobby-btn   { font-size:0.9rem; padding:13px; border-radius:14px; margin-top:6px; }
      .lobby-col-team { display:flex; flex-direction:column; align-items:stretch; justify-content:center; padding:24px 14px; gap:10px; background:var(--card); border-left:1.5px solid #E8E4DC; }
      .lobby-col-team .lobby-label { font-size:0.68rem; text-align:center; }
      .lobby-col-team .team-grid { grid-template-columns:1fr; gap:8px; }
      .lobby-col-team .team-btn { flex-direction:row; justify-content:flex-start; gap:10px; padding:12px 14px; border-radius:12px; font-size:0.82rem; }
      .lobby-col-team .team-btn .team-dot { width:16px; height:16px; flex-shrink:0; }
      .lobby-settings-btn { width:36px; height:36px; font-size:0.9rem; top:10px; right:10px; }
    }

    /* ══ MODAL ══ */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.22); display:flex; align-items:center; justify-content:center; z-index:1000; backdrop-filter:blur(5px); animation:fadeIn 0.15s ease; }
    .modal-card { background:var(--card); border-radius:24px; padding:32px 36px; box-shadow:var(--shadow); width:min(360px,92vw); display:flex; flex-direction:column; gap:20px; }
    .modal-header { display:flex; align-items:center; justify-content:space-between; }
    .modal-title { font-size:1.15rem; font-weight:900; }
    .modal-close { background:#F0F0F0; border:none; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1rem; color:var(--muted); transition:background 0.15s; }
    .modal-close:hover { background:#E0E0E0; }
    .lang-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .lang-btn { border:2.5px solid #ECECEC; border-radius:12px; padding:10px 12px; font-family:'Nunito',sans-serif; font-size:0.88rem; font-weight:800; cursor:pointer; background:#F5F5F5; color:var(--muted); transition:all 0.18s; display:flex; align-items:center; gap:8px; }
    .lang-btn.active { border-color:var(--blue); background:#EFF5FF; color:var(--blue); }
    .lang-btn:hover  { background:#EAEAEA; }
    .modal-save { padding:13px; border:none; border-radius:12px; background:var(--blue); color:#fff; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:900; cursor:pointer; transition:opacity 0.15s; }
    .modal-save:hover { opacity:0.88; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;} }
    @keyframes slideIn { from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:none;} }

    /* ══ GAME ══ */
    .game-wrapper { display:flex; flex-direction:column; width:100%; height:100%; overflow:hidden; }

    /* HUD */
    .hud { display:flex; align-items:center; justify-content:space-between; padding:clamp(5px,1.5vw,8px) clamp(8px,2vw,14px); background:var(--card); box-shadow:0 2px 12px rgba(0,0,0,0.06); z-index:10; flex-shrink:0; gap:8px; }
    .hud-logo { font-size:clamp(0.8rem,2.2vw,1.05rem); font-weight:900; letter-spacing:-0.5px; flex-shrink:0; display:flex; align-items:center; gap:5px; }
    .hud-logo-circle { width:clamp(18px,3vw,26px); height:clamp(18px,3vw,26px); border-radius:50%; background:var(--blue); flex-shrink:0; position:relative; overflow:hidden; }
    .hud-logo-circle::after { content:''; position:absolute; top:15%; left:18%; width:30%; height:30%; border-radius:50%; background:rgba(255,255,255,0.5); }
    .score-bar { flex:1; display:flex; height:clamp(8px,1.5vw,11px); border-radius:8px; overflow:hidden; margin:0 8px; background:#EFEFEF; min-width:50px; }
    .score-seg { height:100%; transition:width 0.4s ease; }
    .hud-scores { display:flex; gap:clamp(6px,1.5vw,9px); flex-shrink:0; }
    .hud-score  { font-size:clamp(0.65rem,1.6vw,0.76rem); font-weight:800; display:flex; align-items:center; gap:3px; }
    .hud-dot    { width:8px; height:8px; border-radius:50%; }
    .hud-right  { display:flex; align-items:center; gap:clamp(5px,1.5vw,8px); flex-shrink:0; }
    .hud-player { font-size:clamp(0.62rem,1.5vw,0.76rem); font-weight:700; color:var(--muted); white-space:nowrap; }
    .hud-player span { font-weight:900; color:var(--text); }
    .player-count { font-size:clamp(0.58rem,1.4vw,0.7rem); font-weight:800; color:var(--muted); }
    .hud-settings-btn { background:none; border:none; font-size:clamp(0.9rem,2vw,1.05rem); cursor:pointer; padding:2px; transition:transform 0.25s; }
    .hud-settings-btn:hover { transform:rotate(40deg); }
    @media (max-width:480px) and (orientation:portrait) { .hud-player,.player-count { display:none; } }

    /* Canvas */
    #pixi-container { flex:1; overflow:hidden; position:relative; cursor:crosshair; touch-action:none; }
    #pixi-container canvas { display:block; width:100% !important; height:100% !important; }

    /* Kill feed */
    .kill-feed { position:absolute; top:10px; left:12px; display:flex; flex-direction:column; gap:4px; pointer-events:none; z-index:5; }
    .kill-item { background:rgba(255,255,255,0.88); border-radius:8px; padding:4px 10px; font-size:0.72rem; font-weight:700; color:var(--text); backdrop-filter:blur(4px); animation:slideIn 0.2s ease; }

    /* Reload bar (중앙 하단) */
    .reload-bar-wrap { position:absolute; bottom:18px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:4px; pointer-events:none; z-index:5; }
    .reload-bar-label { font-size:0.62rem; font-weight:800; color:rgba(255,255,255,0.75); letter-spacing:0.08em; text-transform:uppercase; text-shadow:0 1px 4px rgba(0,0,0,0.5); }
    .reload-bar-track { width:140px; height:8px; border-radius:6px; background:rgba(255,255,255,0.22); overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.18); }
    /* fill은 JS에서 직접 style 조작 — React state 없이 60fps 부드럽게 */
    .reload-bar-fill  { height:100%; border-radius:6px; width:0%; }
    @media (max-width:768px) and (pointer:coarse) { .reload-bar-wrap { bottom:150px; } }

    /* Ping */
    .overlay-hud { position:absolute; bottom:14px; right:14px; display:flex; flex-direction:column; align-items:flex-end; gap:5px; pointer-events:none; z-index:5; }
    .ping-badge { font-size:0.66rem; font-weight:800; color:var(--muted); }
    @media (max-width:768px) and (pointer:coarse) { .overlay-hud { bottom:150px; } }

    /* Controls hint */
    .controls-hint { position:absolute; bottom:12px; left:12px; font-size:0.66rem; font-weight:700; color:var(--muted); pointer-events:none; line-height:1.9; z-index:5; }
    .controls-hint kbd { background:rgba(255,255,255,0.7); border:1.5px solid #DDD; border-radius:4px; padding:1px 5px; font-family:'Nunito',sans-serif; font-size:0.62rem; }

    /* Joystick */
    .joystick-area { position:absolute; bottom:clamp(16px,3vh,28px); z-index:20; pointer-events:all; touch-action:none; user-select:none; -webkit-user-select:none; }
    .joystick-area.left  { left:clamp(16px,4vw,32px); }
    .joystick-area.right { right:clamp(16px,4vw,32px); }
    .joystick-base { width:clamp(88px,18vw,112px); height:clamp(88px,18vw,112px); border-radius:50%; background:rgba(255,255,255,0.15); border:2.5px solid rgba(255,255,255,0.35); display:flex; align-items:center; justify-content:center; position:relative; backdrop-filter:blur(8px); box-shadow:0 4px 20px rgba(0,0,0,0.12); }
    .joystick-stick { width:clamp(36px,7.5vw,46px); height:clamp(36px,7.5vw,46px); border-radius:50%; background:rgba(255,255,255,0.9); box-shadow:0 3px 14px rgba(0,0,0,0.2); position:absolute; pointer-events:none; top:50%; left:50%; transform:translate(-50%,-50%); }
    .joystick-label { position:absolute; bottom:-20px; left:50%; transform:translateX(-50%); font-size:clamp(0.55rem,1.5vw,0.62rem); font-weight:800; color:rgba(255,255,255,0.55); white-space:nowrap; pointer-events:none; }
    @media (orientation:portrait) { .joystick-area { bottom:clamp(20px,4vh,36px); } }

    /* Chat */
    .chat-wrap { position:absolute; bottom:38px; left:12px; width:min(260px,38vw); z-index:15; display:flex; flex-direction:column; gap:6px; }
    @media (max-width:768px) and (pointer:coarse) { .chat-wrap { display:none; } }
    .chat-messages { max-height:130px; overflow-y:auto; display:flex; flex-direction:column; gap:3px; scrollbar-width:none; }
    .chat-messages::-webkit-scrollbar { display:none; }
    .chat-msg { background:rgba(255,255,255,0.84); backdrop-filter:blur(4px); border-radius:8px; padding:4px 9px; font-size:0.7rem; font-weight:700; color:var(--text); word-break:break-all; animation:slideIn 0.15s ease; }
    .chat-msg .chat-name { font-weight:900; margin-right:4px; }
    .chat-input-row { display:flex; gap:5px; }
    .chat-input { flex:1; border:2px solid rgba(255,255,255,0.5); border-radius:10px; padding:6px 10px; font-size:0.72rem; font-family:'Nunito',sans-serif; font-weight:700; color:var(--text); outline:none; background:rgba(255,255,255,0.84); backdrop-filter:blur(4px); transition:border 0.15s; }
    .chat-input:focus { border-color:var(--blue); background:rgba(255,255,255,0.96); }
    .chat-send { border:none; border-radius:10px; padding:6px 10px; font-family:'Nunito',sans-serif; font-size:0.7rem; font-weight:900; cursor:pointer; color:#fff; background:var(--blue); transition:opacity 0.15s; white-space:nowrap; }
    .chat-send:hover { opacity:0.85; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ══════════════ I18N ══════════════ */
const LANGS = {
  en: { code:'en', flag:'🇺🇸', label:'English', nickname:'Nickname', nickname_ph:'Enter your name', team:'Choose Team', red:'Red', blue:'Blue', green:'Green', start:'Play →', settings:'Settings', language:'Language', save:'Save', reload:'RELOAD', ping:'ping', move_hint:'Move', shoot_hint:'Hold 🖱 to Shoot', joystick_move:'MOVE', joystick_shoot:'SHOOT', chat_ph:'Press Enter to chat', chat_send:'Send', join_msg:n=>`🎮 ${n} joined`, leave_msg:n=>`👋 ${n} left`, elim_msg:(a,b)=>`💥 ${a} → ${b}`, team_names:{red:'Red',blue:'Blue',green:'Green'} },
  ko: { code:'ko', flag:'🇰🇷', label:'한국어', nickname:'닉네임', nickname_ph:'이름을 입력하세요', team:'팀 선택', red:'레드', blue:'블루', green:'그린', start:'게임 시작 →', settings:'설정', language:'언어', save:'저장', reload:'장전 중', ping:'ping', move_hint:'이동', shoot_hint:'🖱 꾹 누르면 발사', joystick_move:'이동', joystick_shoot:'발사', chat_ph:'Enter로 채팅', chat_send:'전송', join_msg:n=>`🎮 ${n} 입장`, leave_msg:n=>`👋 ${n} 퇴장`, elim_msg:(a,b)=>`💥 ${a} → ${b}`, team_names:{red:'레드팀',blue:'블루팀',green:'그린팀'} },
  ja: { code:'ja', flag:'🇯🇵', label:'日本語', nickname:'ニックネーム', nickname_ph:'名前を入力', team:'チーム選択', red:'レッド', blue:'ブルー', green:'グリーン', start:'プレイ →', settings:'設定', language:'言語', save:'保存', reload:'リロード', ping:'ping', move_hint:'移動', shoot_hint:'🖱 長押しで射撃', joystick_move:'移動', joystick_shoot:'射撃', chat_ph:'Enterでチャット', chat_send:'送信', join_msg:n=>`🎮 ${n} 参加`, leave_msg:n=>`👋 ${n} 退出`, elim_msg:(a,b)=>`💥 ${a} → ${b}`, team_names:{red:'レッド',blue:'ブルー',green:'グリーン'} },
  zh: { code:'zh', flag:'🇨🇳', label:'中文', nickname:'昵称', nickname_ph:'输入你的名字', team:'选择队伍', red:'红队', blue:'蓝队', green:'绿队', start:'开始游戏 →', settings:'设置', language:'语言', save:'保存', reload:'装弹中', ping:'延迟', move_hint:'移动', shoot_hint:'🖱 长按射击', joystick_move:'移动', joystick_shoot:'射击', chat_ph:'按Enter聊天', chat_send:'发送', join_msg:n=>`🎮 ${n} 加入`, leave_msg:n=>`👋 ${n} 离开`, elim_msg:(a,b)=>`💥 ${a} → ${b}`, team_names:{red:'红队',blue:'蓝队',green:'绿队'} },
};

/* ══════════════ CONSTANTS ══════════════ */
const SERVER_URL = (() => { const l=window.location; return l.protocol==='file:'?'http://localhost:3000':l.origin; })();
const TILE_SIZE=40, TILE_RADIUS=8, GRID_W=40, GRID_H=30;
const MOVE_SPEED=3, SHOOT_INTERVAL=1000, BULLET_SPEED=6, PLAYER_RADIUS=14, BULLET_RADIUS=7;
const BULLET_LIFETIME=2000, BULLET_FADE_START=1500, REBUILD_THRESHOLD=80;
const TEAM_COLORS={red:0xFF5C5C,blue:0x5C9EFF,green:0x5CDB95};
const TEAM_CSS   ={red:'#FF5C5C',blue:'#5C9EFF',green:'#5CDB95'};
function lerp(a,b,t){return a+(b-a)*t;}
function isMobile(){return('ontouchstart'in window||navigator.maxTouchPoints>0)&&window.innerWidth<=1024;}

/* ══════════════ SETTINGS MODAL ══════════════ */
function SettingsModal({lang,onSave,onClose}){
  const t=LANGS[lang]; const[draft,setDraft]=useState(lang);
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-card">
        <div className="modal-header">
          <div className="modal-title">⚙️ {t.settings}</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div>
          <div className="lobby-label">{t.language}</div>
          <div className="lang-grid">
            {Object.values(LANGS).map(l=>(
              <button key={l.code} className={`lang-btn ${draft===l.code?'active':''}`} onClick={()=>setDraft(l.code)}>
                <span style={{fontSize:'1.1rem'}}>{l.flag}</span>{l.label}
              </button>
            ))}
          </div>
        </div>
        <button className="modal-save" onClick={()=>onSave(draft)}>{LANGS[draft].save}</button>
      </div>
    </div>
  );
}

/* ══════════════ LOBBY ══════════════ */
function Lobby({onJoin,lang,setLang}){
  const t=LANGS[lang];
  const[name,setName]=useState('');
  const[team,setTeam]=useState('blue');
  const[showSettings,setShowSettings]=useState(false);
  const teamDefs=[{id:'red',label:t.red,color:TEAM_CSS.red},{id:'blue',label:t.blue,color:TEAM_CSS.blue},{id:'green',label:t.green,color:TEAM_CSS.green}];
  const go=()=>onJoin(name.trim()||'Player',team);
  const Logo=()=>[...'colorize'].map((ch,i)=><span key={i} style={{color:[TEAM_CSS.red,TEAM_CSS.blue,TEAM_CSS.green][i%3]}}>{ch}</span>);
  const Teams=()=>teamDefs.map(tm=>(
    <button key={tm.id} className={`team-btn ${team===tm.id?`active-${tm.id}`:''}`} onClick={()=>setTeam(tm.id)}>
      <div className="team-dot" style={{background:tm.color}}/>{tm.label}
    </button>
  ));
  return(
    <div className="lobby">
      <button className="lobby-settings-btn" onClick={()=>setShowSettings(true)}>⚙️</button>
      <div className="lobby-inner">
        {/* 데스크탑 */}
        <div className="lobby-logo"><div className="logo-circle"/><div className="logo-text"><Logo/><span style={{color:'#999',fontSize:'0.62em'}}>.</span><span style={{color:'#999',fontSize:'0.62em',fontWeight:700}}>io</span></div></div>
        <div className="lobby-card">
          <div><div className="lobby-label">{t.nickname}</div><input className="lobby-input" placeholder={t.nickname_ph} value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} maxLength={16}/></div>
          <div><div className="lobby-label">{t.team}</div><div className="team-grid"><Teams/></div></div>
          <button className={`lobby-btn ${team}`} onClick={go}>{t.start}</button>
        </div>
        {/* 모바일 왼쪽 */}
        <div className="lobby-col-logo"><div className="mob-logo-circle"/><div className="mob-logo-word"><Logo/></div><div className="mob-logo-io">.io</div></div>
        {/* 모바일 중앙 */}
        <div className="lobby-col-nick">
          <div className="lobby-label">{t.nickname}</div>
          <input className="lobby-input" placeholder={t.nickname_ph} value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} maxLength={16}/>
          <button className={`lobby-btn ${team}`} onClick={go}>{t.start}</button>
        </div>
        {/* 모바일 오른쪽 */}
        <div className="lobby-col-team"><div className="lobby-label">{t.team}</div><div className="team-grid"><Teams/></div></div>
      </div>
      {showSettings&&<SettingsModal lang={lang} onSave={l=>{setLang(l);setShowSettings(false);}} onClose={()=>setShowSettings(false)}/>}
    </div>
  );
}

/* ══════════════ JOYSTICK HOOK ══════════════ */
function useJoystick(elRef){
  const vec=useRef({x:0,y:0,active:false});
  useEffect(()=>{
    const el=elRef.current; if(!el) return;
    const base=el.querySelector('.joystick-base');
    const stick=el.querySelector('.joystick-stick');
    const R=33; let tid=null;
    const center=()=>{const r=base.getBoundingClientRect();return{cx:r.left+r.width/2,cy:r.top+r.height/2};};
    const move=(rx,ry)=>{const d=Math.hypot(rx,ry);const k=d>R?R/d:1;const sx=rx*k,sy=ry*k;stick.style.transform=`translate(calc(-50% + ${sx}px),calc(-50% + ${sy}px))`;vec.current={x:sx/R,y:sy/R,active:d>6};};
    const reset=()=>{stick.style.transform='translate(-50%,-50%)';vec.current={x:0,y:0,active:false};tid=null;};
    const onStart=e=>{if(tid!==null)return;const t=e.changedTouches[0];tid=t.identifier;const{cx,cy}=center();move(t.clientX-cx,t.clientY-cy);e.preventDefault();};
    const onMove=e=>{if(tid===null)return;const t=[...e.changedTouches].find(t=>t.identifier===tid);if(!t)return;const{cx,cy}=center();move(t.clientX-cx,t.clientY-cy);e.preventDefault();};
    const onEnd=e=>{if([...e.changedTouches].some(t=>t.identifier===tid))reset();};
    el.addEventListener('touchstart',onStart,{passive:false});
    el.addEventListener('touchmove', onMove, {passive:false});
    el.addEventListener('touchend',  onEnd,  {passive:false});
    el.addEventListener('touchcancel',onEnd, {passive:false});
    return()=>{el.removeEventListener('touchstart',onStart);el.removeEventListener('touchmove',onMove);el.removeEventListener('touchend',onEnd);el.removeEventListener('touchcancel',onEnd);};
  },[]);
  return vec;
}

}

/* ══════════════ GAME ══════════════ */
function Game({playerName,playerTeam,lang,setLang,socketRef,chatMsgs,setChatMsgs,chatInput,setChatInput}){
  const t=LANGS[lang]; const mobile=isMobile();
  const containerRef=useRef(null);
  const leftJoyRef=useRef(null); const rightJoyRef=useRef(null);
  const moveVec=useJoystick(leftJoyRef); const shootVec=useJoystick(rightJoyRef);

  const state=useRef({players:{},bullets:{},tiles:[],myId:null,keys:{},mousePos:{x:0,y:0},mouseDown:false,lastShot:0,camX:0,camY:0});
  const tileGfxRef=useRef(null);
  const playerGfxMap=useRef({}); // id → {c, sprite, txt, color, isMe}
  const bulletGfxMap=useRef({}); // id → Sprite
  const texCache=useRef({});
  const dirtyCount=useRef(0); const rebuildFlag=useRef(false);
  const langRef=useRef(lang);
  useEffect(()=>{langRef.current=lang;},[lang]);

  const[scores,setScores]=useState({red:0,blue:0,green:0});
  const[playerCount,setPlayerCount]=useState(0);
  const[ping,setPing]=useState(0);
  const[killFeed,setKillFeed]=useState([]);
  const[showSettings,setShowSettings]=useState(false);

  // 리로드바 DOM 직접 조작 (React state 없이 → 60fps 완전 부드럽게)
  const reloadFillRef  = useRef(null); // .reload-bar-fill 엘리먼트
  const reloadLabelRef = useRef(null); // .reload-bar-label 엘리먼트

  // 채팅 말풍선: { [playerId]: { container, text, timer } }
  const chatBubbles = useRef({});
  const killTimers=useRef([]);

  function addFeed(msg){
    const id=Date.now()+Math.random();
    setKillFeed(f=>[...f.slice(-4),{id,msg}]);
    const timer=setTimeout(()=>setKillFeed(f=>f.filter(k=>k.id!==id)),3500);
    killTimers.current.push(timer);
  }
  function calcScores(tiles){const s={red:0,blue:0,green:0};tiles.forEach(row=>row.forEach(tm=>{if(tm)s[tm]++;}));setScores(s);}

  /* ── PIXI helpers ── */
  function buildTiles(layer,tiles){
    layer.removeChildren();
    const gfx=new PIXI.Graphics();
    for(let y=0;y<GRID_H;y++) for(let x=0;x<GRID_W;x++){const team=tiles[y]?.[x];gfx.beginFill(team?TEAM_COLORS[team]:0xE8E4DC,team?1:0.6);gfx.drawRoundedRect(x*TILE_SIZE+3,y*TILE_SIZE+3,TILE_SIZE-6,TILE_SIZE-6,TILE_RADIUS);gfx.endFill();}
    layer.addChild(gfx); tileGfxRef.current=gfx; dirtyCount.current=0; rebuildFlag.current=false;
  }
  function patchTile(tx,ty,team){
    const gfx=tileGfxRef.current; if(!gfx)return;
    gfx.beginFill(team?TEAM_COLORS[team]:0xE8E4DC,team?1:0.6);
    gfx.drawRoundedRect(tx*TILE_SIZE+3,ty*TILE_SIZE+3,TILE_SIZE-6,TILE_SIZE-6,TILE_RADIUS);
    gfx.endFill();
    if(++dirtyCount.current>=REBUILD_THRESHOLD)rebuildFlag.current=true;
  }
  function getPlayerTex(app,color,isMe){
    const key=`p_${color}_${isMe}`; if(texCache.current[key])return texCache.current[key];
    const g=new PIXI.Graphics();
    g.beginFill(0,0.09);g.drawCircle(2,4,PLAYER_RADIUS);g.endFill();
    g.beginFill(color);g.drawCircle(0,0,PLAYER_RADIUS);g.endFill();
    g.beginFill(0xFFFFFF,0.24);g.drawCircle(-3,-3,PLAYER_RADIUS*0.4);g.endFill();
    if(isMe){g.lineStyle(2.5,0xFFFFFF,0.8);g.drawCircle(0,0,PLAYER_RADIUS+3);g.lineStyle(0);}
    const tex=app.renderer.generateTexture(g,{resolution:2}); g.destroy(); texCache.current[key]=tex; return tex;
  }
  function getBulletTex(app,color){
    const key=`b_${color}`; if(texCache.current[key])return texCache.current[key];
    const g=new PIXI.Graphics();
    g.beginFill(color,0.25);g.drawCircle(-BULLET_SPEED*1.4,0,BULLET_RADIUS*0.65);g.endFill();
    g.beginFill(color);g.drawCircle(0,0,BULLET_RADIUS);g.endFill();
    g.beginFill(0xFFFFFF,0.5);g.drawCircle(-2,-2,BULLET_RADIUS*0.38);g.endFill();
    const tex=app.renderer.generateTexture(g,{resolution:2}); g.destroy(); texCache.current[key]=tex; return tex;
  }

  // 플레이어 렌더: alive 목록에 없는 것 제거, 있는 것 업데이트
  // 채팅 말풍선 표시 함수 (PIXI)
  function showChatBubble(playerLayer, playerId, text, teamColor) {
    const entry = playerGfxMap.current[playerId];
    if (!entry) return;

    // 기존 말풍선 제거
    removeChatBubble(playerId);

    // 말풍선 컨테이너 생성
    const bubble = new PIXI.Container();

    // 텍스트 (최대 20자 줄임)
    const display = text.length > 20 ? text.slice(0, 19) + '…' : text;
    const txt = new PIXI.Text(display, {
      fontFamily: 'Nunito', fontSize: 12, fontWeight: '700',
      fill: 0x2D2D2D, align: 'center',
    });
    txt.anchor.set(0.5, 0.5);

    // 배경 박스
    const pad = 8;
    const bg = new PIXI.Graphics();
    bg.beginFill(0xFFFFFF, 0.92);
    bg.lineStyle(1.5, teamColor ?? 0x5C9EFF, 0.8);
    bg.drawRoundedRect(
      -txt.width/2 - pad, -txt.height/2 - pad/2,
      txt.width + pad*2, txt.height + pad,
      8
    );
    bg.endFill();

    // 꼬리 삼각형
    bg.beginFill(0xFFFFFF, 0.92);
    const bw = 6;
    bg.moveTo(-bw, txt.height/2 + pad/2);
    bg.lineTo( bw, txt.height/2 + pad/2);
    bg.lineTo(0,   txt.height/2 + pad/2 + 7);
    bg.closePath();
    bg.endFill();

    bubble.addChild(bg, txt);
    // 플레이어 이름 위에 배치
    bubble.y = -(PLAYER_RADIUS + 36);
    entry.c.addChild(bubble);

    // 3초 후 제거
    const timer = setTimeout(() => removeChatBubble(playerId), 3000);
    chatBubbles.current[playerId] = { bubble, timer };
  }

  function removeChatBubble(playerId) {
    const b = chatBubbles.current[playerId];
    if (!b) return;
    clearTimeout(b.timer);
    const entry = playerGfxMap.current[playerId];
    if (entry) entry.c.removeChild(b.bubble);
    b.bubble.destroy({ children: true });
    delete chatBubbles.current[playerId];
  }

  function renderPlayers(app,layer,players,myId){
    const alive=new Set(Object.keys(players));
    Object.keys(playerGfxMap.current).forEach(id=>{
      if(!alive.has(id)){const e=playerGfxMap.current[id];if(e.c.parent)e.c.parent.removeChild(e.c);e.c.destroy({children:true});delete playerGfxMap.current[id];}
    });
    Object.entries(players).forEach(([id,p])=>{
      const color=TEAM_COLORS[p.team]??0xAAAAAA; const isMe=id===myId;
      if(!playerGfxMap.current[id]){
        const sp=new PIXI.Sprite(getPlayerTex(app,color,isMe)); sp.anchor.set(0.5);
        const txt=new PIXI.Text(p.name,{fontFamily:'Nunito',fontSize:11,fontWeight:'800',fill:0xFFFFFF,stroke:0x000000,strokeThickness:2,align:'center'});
        txt.anchor.set(0.5,1); txt.y=-(PLAYER_RADIUS+4);
        const c=new PIXI.Container(); c.addChild(sp,txt); layer.addChild(c);
        playerGfxMap.current[id]={c,sprite:sp,txt,color,isMe};
      }
      const e=playerGfxMap.current[id];
      if(e.color!==color||e.isMe!==isMe){e.sprite.texture=getPlayerTex(app,color,isMe);e.color=color;e.isMe=isMe;}
      e.txt.text=p.name; e.c.x=p.x; e.c.y=p.y;
    });
  }

  // 총알 렌더
  function renderBullets(app,layer,bullets){
    const alive=new Set(Object.keys(bullets)); const now=Date.now();
    Object.keys(bulletGfxMap.current).forEach(id=>{
      if(!alive.has(id)){const sp=bulletGfxMap.current[id];if(sp.parent)sp.parent.removeChild(sp);sp.destroy();delete bulletGfxMap.current[id];}
    });
    Object.entries(bullets).forEach(([id,b])=>{
      const age=now-b.spawnTime;
      const ratio=age<BULLET_FADE_START?1:Math.max(0,1-(age-BULLET_FADE_START)/(BULLET_LIFETIME-BULLET_FADE_START));
      if(ratio<=0)return;
      const color=TEAM_COLORS[b.team]??0xAAAAAA;
      if(!bulletGfxMap.current[id]){const sp=new PIXI.Sprite(getBulletTex(app,color));sp.anchor.set(0.5);layer.addChild(sp);bulletGfxMap.current[id]=sp;}
      const sp=bulletGfxMap.current[id]; sp.alpha=ratio; sp.x=b.x; sp.y=b.y; sp.rotation=Math.atan2(b.dy,b.dx);
    });
  }

  /* ── MAIN EFFECT ── */
  useEffect(()=>{
    const s=state.current;
    s.tiles=Array.from({length:GRID_H},()=>Array(GRID_W).fill(null));

    const app=new PIXI.Application({resizeTo:containerRef.current,backgroundColor:0xF7F5F0,antialias:true,autoDensity:true});
    containerRef.current.appendChild(app.view);
    const tileLayer=new PIXI.Container(), playerLayer=new PIXI.Container(), bulletLayer=new PIXI.Container();
    app.stage.addChild(tileLayer,playerLayer,bulletLayer);
    buildTiles(tileLayer,s.tiles);

    const socket=io(SERVER_URL,{transports:['websocket']});
    socketRef.current=socket;

    socket.on('connect',()=>{socket.emit('join',{name:playerName,team:playerTeam});});

    // init — 고스트 방지: GFX 전체 교체
    socket.on('init',({id,tiles,players})=>{
      s.myId=id;
      if(tiles)s.tiles=tiles;
      // 기존 GFX 전부 제거
      Object.keys(playerGfxMap.current).forEach(pid=>{
        const e=playerGfxMap.current[pid]; if(e.c.parent)e.c.parent.removeChild(e.c); e.c.destroy({children:true}); delete playerGfxMap.current[pid];
      });
      s.players={};
      if(players)Object.entries(players).forEach(([pid,p])=>{s.players[pid]={...p,tx:p.x,ty:p.y};});
      buildTiles(tileLayer,s.tiles); calcScores(s.tiles);
      setPlayerCount(Object.keys(s.players).length);
    });

    // player_join — 고스트 방지: 중복 GFX 제거 후 재등록
    socket.on('player_join',p=>{
      if(playerGfxMap.current[p.id]){
        const e=playerGfxMap.current[p.id]; if(e.c.parent)e.c.parent.removeChild(e.c); e.c.destroy({children:true}); delete playerGfxMap.current[p.id];
      }
      s.players[p.id]={...p,tx:p.x,ty:p.y};
      setPlayerCount(Object.keys(s.players).length);
      addFeed(LANGS[langRef.current].join_msg(p.name));
    });

    // player_leave — GFX 명시적 제거
    socket.on('player_leave',({id})=>{
      const name=s.players[id]?.name;
      if(playerGfxMap.current[id]){
        const e=playerGfxMap.current[id]; if(e.c.parent)e.c.parent.removeChild(e.c); e.c.destroy({children:true}); delete playerGfxMap.current[id];
      }
      delete s.players[id];
      setPlayerCount(Object.keys(s.players).length);
      if(name)addFeed(LANGS[langRef.current].leave_msg(name));
    });

    socket.on('player_move',({id,x,y})=>{if(s.players[id]){s.players[id].tx=x;s.players[id].ty=y;}});
    socket.on('bullet_spawn',b=>{s.bullets[b.id]={...b,spawnTime:Date.now()};});
    socket.on('bullet_remove',({id})=>{delete s.bullets[id];});
    socket.on('tile_paint',({x,y,team})=>{if(s.tiles[y]){s.tiles[y][x]=team;patchTile(x,y,team);calcScores(s.tiles);}});
    socket.on('tiles_batch',batch=>{batch.forEach(({x,y,team})=>{if(s.tiles[y]){s.tiles[y][x]=team;patchTile(x,y,team);}});calcScores(s.tiles);});
    socket.on('player_eliminated',({killerId,killedId})=>{const kr=s.players[killerId],kd=s.players[killedId];if(kr&&kd)addFeed(LANGS[langRef.current].elim_msg(kr.name,kd.name));});
    socket.on('respawn',({x,y})=>{const me=s.players[s.myId];if(me){me.x=x;me.y=y;me.tx=x;me.ty=y;}});
    socket.on('chat',({id,name,team,text})=>{
      const color=TEAM_CSS[team]??'#999';
      setChatMsgs(msgs=>[...msgs.slice(-49),{id:Date.now()+Math.random(),name,color,text}]);
      // 해당 플레이어 찾아서 말풍선 표시
      // [FIX] id 기반 정확한 매칭 (동명이인 버그 수정)
      const sender=id&&s.players[id]?s.players[id]:Object.values(s.players).find(p=>p.name===name&&p.team===team);
      if(sender){
        const teamHex=TEAM_COLORS[team]??0x5C9EFF;
        showChatBubble(playerLayer,sender.id,text,teamHex);
      }
    });

    let pingT=0;
    const pingIv=setInterval(()=>{pingT=Date.now();socket.emit('ping_c');},2000);
    socket.on('pong_c',()=>setPing(Date.now()-pingT));

    const onKD=e=>{s.keys[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();};
    const onKU=e=>{s.keys[e.code]=false;};
    window.addEventListener('keydown',onKD); window.addEventListener('keyup',onKU);

    const cv=app.view;
    // [FIX] mousePos를 논리픽셀(CSS픽셀) 기준으로 저장
const onMM=e=>{const r=cv.getBoundingClientRect();s.mousePos={x:(e.clientX-r.left)*app.screen.width/r.width,y:(e.clientY-r.top)*app.screen.height/r.height};};
    const onMD=()=>{s.mouseDown=true;}; const onMU=()=>{s.mouseDown=false;};
    cv.addEventListener('mousemove',onMM); cv.addEventListener('mousedown',onMD);
    window.addEventListener('mouseup',onMU);

    app.ticker.add(()=>{
      const now=Date.now(); const me=s.players[s.myId];
      if(me){
        let dx=0,dy=0;
        if(!mobile){if(s.keys['KeyW']||s.keys['ArrowUp'])dy-=MOVE_SPEED;if(s.keys['KeyS']||s.keys['ArrowDown'])dy+=MOVE_SPEED;if(s.keys['KeyA']||s.keys['ArrowLeft'])dx-=MOVE_SPEED;if(s.keys['KeyD']||s.keys['ArrowRight'])dx+=MOVE_SPEED;}
        else{const mv=moveVec.current;if(mv.active){dx=mv.x*MOVE_SPEED;dy=mv.y*MOVE_SPEED;}}
        if(dx&&dy){dx*=0.707;dy*=0.707;}
        me.x=Math.max(PLAYER_RADIUS,Math.min(GRID_W*TILE_SIZE-PLAYER_RADIUS,me.x+dx));
        me.y=Math.max(PLAYER_RADIUS,Math.min(GRID_H*TILE_SIZE-PLAYER_RADIUS,me.y+dy));
        me.tx=me.x; me.ty=me.y;
        if(dx||dy){
          socket.emit('move',{x:me.x,y:me.y});
          const tx=Math.floor(me.x/TILE_SIZE),ty=Math.floor(me.y/TILE_SIZE);
          if(s.tiles[ty]?.[tx]!==me.team)socket.emit('paint_tile',{x:tx,y:ty});
        }

        // 장전 진행률 — DOM 직접 조작 (React state 없이 60fps 완전 부드럽게)
        const elapsed=s.lastShot>0?now-s.lastShot:SHOOT_INTERVAL;
        const pct=Math.min(1,elapsed/SHOOT_INTERVAL);
        const ready=pct>=1;
        if(reloadFillRef.current){
          const color=tcRef.current;
          reloadFillRef.current.style.width=`${pct*100}%`;
          reloadFillRef.current.style.background=ready?color:`${color}88`;
        }
        if(reloadLabelRef.current){
          reloadLabelRef.current.textContent=ready?'🎨':langRef.current==='ko'?'장전 중':langRef.current==='ja'?'リロード':langRef.current==='zh'?'装弹中':'RELOAD';
        }

        // 발사 (장전 완료 시에만)
        let shoot=false,sdx=0,sdy=0;
        // [FIX] 마우스 → 월드 좌표 변환 후 발사 방향 계산
        if(!mobile&&s.mouseDown){const mwx=s.mousePos.x+s.camX,mwy=s.mousePos.y+s.camY;const len=Math.hypot(mwx-me.x,mwy-me.y)||1;sdx=((mwx-me.x)/len)*BULLET_SPEED;sdy=((mwy-me.y)/len)*BULLET_SPEED;shoot=true;}
        else if(mobile){const sv=shootVec.current;if(sv.active){const len=Math.hypot(sv.x,sv.y)||1;sdx=(sv.x/len)*BULLET_SPEED;sdy=(sv.y/len)*BULLET_SPEED;shoot=true;}}
        // [FIX] 가만히 있을 때도 발사 직전 위치를 서버에 동기화 (총알 spawn 위치 오류 방지)
        if(shoot&&ready){s.lastShot=now;socket.emit('move',{x:me.x,y:me.y});socket.emit('shoot',{dx:sdx,dy:sdy});}

        s.camX=lerp(s.camX,me.x-app.screen.width/2,0.1);
        s.camY=lerp(s.camY,me.y-app.screen.height/2,0.1);
      }

      s.camX=Math.max(0,Math.min(GRID_W*TILE_SIZE-app.screen.width,s.camX));
      s.camY=Math.max(0,Math.min(GRID_H*TILE_SIZE-app.screen.height,s.camY));
      tileLayer.x=playerLayer.x=bulletLayer.x=-s.camX;
      tileLayer.y=playerLayer.y=bulletLayer.y=-s.camY;

      Object.entries(s.players).forEach(([id,p])=>{if(id!==s.myId){p.x=lerp(p.x??p.tx,p.tx,0.18);p.y=lerp(p.y??p.ty,p.ty,0.18);}});
      // [FIX] spawnTime 미존재 방어 + 경계 처리 강화
      Object.entries(s.bullets).forEach(([id,b])=>{b.x+=b.dx;b.y+=b.dy;const age=b.spawnTime?Date.now()-b.spawnTime:0;if(age>=BULLET_LIFETIME||b.x<-TILE_SIZE||b.x>(GRID_W+1)*TILE_SIZE||b.y<-TILE_SIZE||b.y>(GRID_H+1)*TILE_SIZE)delete s.bullets[id];});
      if(rebuildFlag.current)buildTiles(tileLayer,s.tiles);
      renderPlayers(app,playerLayer,s.players,s.myId);
      renderBullets(app,bulletLayer,s.bullets);
    });

    cv.addEventListener('webglcontextlost',e=>{e.preventDefault();},false);
    cv.addEventListener('webglcontextrestored',()=>{Object.values(texCache.current).forEach(t=>{try{t.destroy(true);}catch(_){}});texCache.current={};buildTiles(tileLayer,s.tiles);},false);

    return()=>{
      clearInterval(pingIv);
      killTimers.current.forEach(clearTimeout); killTimers.current=[];
      // 말풍선 전부 정리
      Object.keys(chatBubbles.current).forEach(id=>removeChatBubble(id));
      socket.disconnect(); socketRef.current=null;
      window.removeEventListener('keydown',onKD); window.removeEventListener('keyup',onKU); window.removeEventListener('mouseup',onMU);
      cv.removeEventListener('mousemove',onMM); cv.removeEventListener('mousedown',onMD);
      Object.values(texCache.current).forEach(t=>{try{t.destroy(true);}catch(_){}});
      texCache.current={};
      app.destroy(true);
    };
  },[]);

  // 팀 색상 ref (게임루프 클로저에서 접근용)
  const tcRef = useRef(TEAM_CSS[playerTeam] ?? '#999');

  const total=GRID_W*GRID_H;
  const rp=(scores.red/total*100).toFixed(1);
  const bp=(scores.blue/total*100).toFixed(1);
  const gp=(scores.green/total*100).toFixed(1);
  const tc=tcRef.current;

  return(
    <div className="game-wrapper">
      <div className="hud">
        <div className="hud-logo"><div className="hud-logo-circle"/><span style={{color:'#555',fontWeight:900}}>colorize</span><span style={{color:'#999',fontSize:'0.8em'}}>.io</span></div>
        <div className="score-bar"><div className="score-seg" style={{width:`${rp}%`,background:TEAM_CSS.red}}/><div className="score-seg" style={{width:`${bp}%`,background:TEAM_CSS.blue}}/><div className="score-seg" style={{width:`${gp}%`,background:TEAM_CSS.green}}/></div>
        <div className="hud-scores">{['red','blue','green'].map(tm=><div className="hud-score" key={tm}><div className="hud-dot" style={{background:TEAM_CSS[tm]}}/>{scores[tm]}</div>)}</div>
        <div className="hud-right">
          <div className="hud-player"><span>{playerName}</span> · {t.team_names[playerTeam]}</div>
          <div className="player-count">👥 {playerCount}</div>
          <button className="hud-settings-btn" onClick={()=>setShowSettings(true)}>⚙️</button>
        </div>
      </div>

      <div id="pixi-container" ref={containerRef}>
        <div className="kill-feed">{killFeed.map(k=><div key={k.id} className="kill-item">{k.msg}</div>)}</div>

        {/* 장전 바 — DOM ref로 직접 조작 */}
        <div className="reload-bar-wrap">
          <div className="reload-bar-label" ref={reloadLabelRef}>🎨</div>
          <div className="reload-bar-track">
            <div className="reload-bar-fill" ref={reloadFillRef} style={{width:'100%',background:tc}}/>
          </div>
        </div>

        <div className="overlay-hud"><div className="ping-badge">{t.ping} {ping}ms</div></div>

        {!mobile&&<div className="controls-hint"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> {t.move_hint}&nbsp;·&nbsp;{t.shoot_hint}</div>}

        {!mobile&&(
          <ChatBox lang={lang} msgs={chatMsgs} input={chatInput} setInput={setChatInput}
            onSend={()=>{const text=chatInput.trim();if(!text||!socketRef.current)return;socketRef.current.emit('chat',{text});setChatInput('');}}/>
        )}

        {mobile&&(
          <>
            <div className="joystick-area left" ref={leftJoyRef}><div className="joystick-base"><div className="joystick-stick"/></div><div className="joystick-label">{t.joystick_move}</div></div>
            <div className="joystick-area right" ref={rightJoyRef}><div className="joystick-base"><div className="joystick-stick"/></div><div className="joystick-label">{t.joystick_shoot}</div></div>
          </>
        )}
      </div>

      {showSettings&&<SettingsModal lang={lang} onSave={l=>{setLang(l);setShowSettings(false);}} onClose={()=>setShowSettings(false)}/>}
    </div>
  );
}

/* ══════════════ APP ROOT ══════════════ */
function AppRoot(){
  const[lang,setLangState]=useState(()=>localStorage.getItem('cz_lang')||'en');
  const[phase,setPhase]=useState('lobby');
  const[pName,setPName]=useState('');
  const[pTeam,setPTeam]=useState('blue');
  const socketRef=useRef(null);
  const[chatMsgs,setChatMsgs]=useState([]);
  const[chatInput,setChatInput]=useState('');

  function setLang(l){localStorage.setItem('cz_lang',l);setLangState(l);}
  function handleJoin(name,team){setPName(name);setPTeam(team);setPhase('game');}

  return phase==='lobby'
    ?<Lobby onJoin={handleJoin} lang={lang} setLang={setLang}/>
    :<Game playerName={pName} playerTeam={pTeam} lang={lang} setLang={setLang}
        socketRef={socketRef} chatMsgs={chatMsgs} setChatMsgs={setChatMsgs}
        chatInput={chatInput} setChatInput={setChatInput}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppRoot/>);
</script>

  if('serviceWorker'in navigator){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('/sw.js')
        .then(r=>console.log('SW:',r.scope))
        .catch(e=>console.warn('SW failed:',e));
    });
  }
</script>
